apiVersion: apps/v1
kind: Deployment
metadata:
  name: jesus-practica-deployment
  namespace: jesus-practica-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jesus-practica-deployment
  template:
    metadata:
      labels:
        app: jesus-practica-deployment
    spec:
      containers:
      - name: jesus-practica-container
        image: jesus-practica:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: jesus-practica-secret